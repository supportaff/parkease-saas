steps:
  # Build frontend
  - name: node:20
    entrypoint: npm
    args: ['install']
    dir: '.'
  - name: node:20
    entrypoint: npm
    args: ['run', 'build']
    dir: '.'

  # Deploy frontend to Firebase Hosting
  - name: 'gcr.io/$PROJECT_ID/firebase'
    args: ['deploy', '--only', 'hosting', '--project=$PROJECT_ID']

  # Build & deploy backend to Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/parkease-api', 'api/']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/parkease-api']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'parkease-api'
      - '--image=gcr.io/$PROJECT_ID/parkease-api'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'

timeout: 1200s